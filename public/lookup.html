<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Car Show Judge — Look Up Car</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="card">
      <header class="topbar">
        <span id="judge-name" class="muted"></span>
        <button id="logout" class="link-btn" type="button">Log out</button>
      </header>

      <!-- State 1: enter the registration number -->
      <section id="entry" hidden>
        <h1>Enter Registration Number</h1>
        <p class="muted">From the dash card.</p>
        <form id="lookup-form" novalidate>
          <input
            type="text"
            inputmode="numeric"
            pattern="[0-9]*"
            name="participant"
            id="participant-input"
            class="big-number"
            required
            autocomplete="off"
          />
          <button type="submit">Look Up</button>
          <p id="lookup-error" class="error" hidden></p>
        </form>
      </section>

      <!-- State 2: confirm the right car -->
      <section id="confirmation" hidden>
        <h1>Is This The Right Car?</h1>
        <dl class="car-details" id="car-details"></dl>
        <button id="start-judging" type="button">Yes — Start Judging</button>
        <button id="try-again" class="secondary" type="button">
          No — Try a Different Number
        </button>
      </section>
    </main>
    <script src="/lookup.js" defer></script>
  </body>
</html>
